name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Build test database image
        run: docker build -t test-postgres -f .github/Dockerfile.test-db .

      - name: Start PostgreSQL container
        run: |
          docker run -d \
            --name test-postgres \
            -e POSTGRES_USER=test_user \
            -e POSTGRES_PASSWORD=test_password \
            -e POSTGRES_DB=test_db \
            -p 5432:5432 \
            test-postgres

          # Wait for PostgreSQL to accept connections FROM THE HOST
          echo "Waiting for PostgreSQL to accept host connections..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U test_user; then
              echo "PostgreSQL is ready and accepting host connections"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "ERROR: PostgreSQL failed to become ready"
          docker logs test-postgres
          exit 1

      - name: Setup PostgreSQL extensions
        env:
          PGPASSWORD: test_password
        run: |
          # Create extensions with retry logic
          for ext in vector postgis; do
            for i in {1..5}; do
              if psql -h localhost -U test_user -d test_db -c "CREATE EXTENSION IF NOT EXISTS $ext;"; then
                echo "Extension $ext created successfully"
                break
              fi
              echo "Retry $i/5 for extension $ext..."
              sleep 2
            done
          done

          # Verify extensions were created
          psql -h localhost -U test_user -d test_db -c "SELECT extname FROM pg_extension WHERE extname IN ('vector', 'postgis');"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
          DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
          ASYNC_DATABASE_URL: postgresql+psycopg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SUPABASE_URL: https://mock.supabase.co
          SUPABASE_KEY: mock_key_for_testing
          SUPABASE_SECRET_KEY: mock_secret_key_for_testing
          SUPABASE_JWT_SECRET: mock_jwt_secret_for_testing_purposes_only_32chars
          SENTRY_DSN: ""
          ENVIRONMENT: test
          CI: "true"
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=90

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install ruff mypy

      - name: Run ruff
        run: ruff check app/ --output-format=github

      - name: Run mypy
        run: mypy app/ --ignore-missing-imports --no-error-summary || true
