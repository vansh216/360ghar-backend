              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Too many real-time subscribers. Please retry shortly.

  # ===================== ADMIN MODERATION =====================
  /flatmates/moderation/listings:
    get:
      tags: [Admin Moderation]
      summary: Get listings for moderation
      description: |
        Get listings pending moderation review. Requires admin role.
        Auto-pauses expired listings before returning results.
      operationId: getPendingListings
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            default: pending_review
          description: Filter by moderation status
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paginated listings for moderation
          content:
            application/json:
              schema:
                type: object
                properties:
                  listings:
                    type: array
                    items:
                      $ref: '#/components/schemas/FlatmateListingAdmin'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        '403':
          $ref: '#/components/responses/Forbidden'

  /flatmates/moderation/listings/{listing_id}:
    put:
      tags: [Admin Moderation]
      summary: Moderate a listing
      description: |
        Moderate a listing: approve, reject, or request edit. Requires admin role.
        On first approval, a 24-hour launch boost is automatically applied.
      operationId: moderateListing
      security:
        - BearerAuth: []
      parameters:
        - name: listing_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingModerationAction'
      responses:
        '200':
          description: Moderation action applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  listing_id:
                    type: integer
                  action:
                    type: string
                    enum: [approve, reject, request_edit]
                  status:
                    type: string
                  reason:
                    type: string
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /flatmates/moderation/reports:
    get:
      tags: [Admin Moderation]
      summary: Get reports for moderation
      description: Get user reports pending review. Requires admin role.
      operationId: getPendingReports
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            default: open
          description: Filter by report status
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Paginated reports for moderation
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReportAdmin'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        '403':
          $ref: '#/components/responses/Forbidden'

  /flatmates/moderation/reports/{report_id}:
    put:
      tags: [Admin Moderation]
      summary: Moderate a report
      description: |
        Moderate a user report: dismiss, warn user, suspend user, or escalate. Requires admin role.
        Suspension deactivates the reported user's account.
      operationId: moderateReport
      security:
        - BearerAuth: []
      parameters:
        - name: report_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportModerationAction'
      responses:
        '200':
          description: Moderation action applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  report_id:
                    type: integer
                  action:
                    type: string
                    enum: [dismiss, warn_user, suspend_user, escalate]
                  status:
                    type: string
                  notes:
                    type: string
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /flatmates/moderation/prescreen/{listing_id}:
    post:
      tags: [Admin Moderation]
      summary: Pre-screen a listing
      description: |
        Run deterministic AI pre-screening for a flatmates listing.
        Checks: photos present, required fields, pricing anomalies, spam keywords.
        Requires admin role.
      operationId: prescreenListing
      security:
        - BearerAuth: []
      parameters:
        - name: listing_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Pre-screen result
          content:
            application/json:
              schema:
                type: object
                properties:
                  listing_id:
                    type: integer
                  prescreen_result:
                    type: object
                  prescreen_flags:
                    type: array
                    items:
                      type: string
                  prescreen_reason:
                    type: string
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

