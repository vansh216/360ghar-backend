  # ===================== BLOCKS & REPORTS =====================
  /flatmates/blocks:
    get:
      tags: [Blocks & Reports]
      summary: Get blocked users
      description: List all users blocked by the current user.
      operationId: getBlockedUsers
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of blocked users
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    blocker_user_id:
                      type: integer
                    blocked_user_id:
                      type: integer
                    created_at:
                      type: string
                      format: date-time
                    blocked_user:
                      $ref: '#/components/schemas/FlatmatesPeer'

    post:
      tags: [Blocks & Reports]
      summary: Block a user
      description: |
        Block a user. This closes any active conversation and prevents future matching.
        Set `unmatch_only=true` to unmatch without blocking.
      operationId: blockUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockCreate'
      responses:
        '200':
          description: User blocked
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/BlockOut'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: Users unmatched successfully

  /flatmates/blocks/{blocked_user_id}:
    delete:
      tags: [Blocks & Reports]
      summary: Unblock a user
      operationId: unblockUser
      security:
        - BearerAuth: []
      parameters:
        - name: blocked_user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User unblocked
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User unblocked successfully
        '404':
          $ref: '#/components/responses/NotFound'

  /flatmates/reports:
    post:
      tags: [Blocks & Reports]
      summary: Report a user
      description: |
        Report a user for spam, fake profile, abuse, inappropriate content, or other reasons.
        Profiles with 3+ distinct active reports are auto-paused pending admin review.
      operationId: reportUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
