      operationId: webSearch
      security: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search query (locality, society name, or free-text)
        - name: search_type
          in: query
          schema:
            type: string
            enum: [listings, profiles, all]
            default: listings
          description: Type of search
        - name: lat
          in: query
          schema:
            type: number
            format: float
        - name: lng
          in: query
          schema:
            type: number
            format: float
        - name: radius
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 5
          description: Search radius in km
        - name: property_type
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [flatmate, pg]
        - name: purpose
          in: query
          schema:
            type: string
            enum: [rent]
        - name: city
          in: query
          schema:
            type: string
        - name: locality
          in: query
          schema:
            type: string
        - name: sub_locality
          in: query
          schema:
            type: string
        - name: price_min
          in: query
          schema:
            type: number
            minimum: 0
        - name: price_max
          in: query
          schema:
            type: number
            maximum: 1000000000
        - name: bedrooms_min
          in: query
          schema:
            type: integer
            minimum: 0
        - name: bedrooms_max
          in: query
          schema:
            type: integer
            maximum: 20
        - name: sharing_type
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [private_room, shared_room, master_bedroom, entire_flat]
        - name: gender_preference
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [male, female, any]
        - name: move_in
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [immediate, this_month, next_month, flexible]
        - name: available_from
          in: query
          schema:
            type: string
            format: date
        - name: amenities
          in: query
          schema:
            type: array
            items:
              type: string
        - name: features
          in: query
          schema:
            type: array
            items:
              type: string
        - name: society_type
          in: query
          schema:
            type: string
            enum: [gated, independent, co_living, pg]
        - name: society_vibe_tags
          in: query
          schema:
            type: array
            items:
              type: string
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [distance, price_low, price_high, newest, popular, relevance, match_percentage]
            default: newest
        - name: semantic_search
          in: query
          schema:
            type: boolean
            default: false
        - name: exclude_swiped
          in: query
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebSearchResponse'

