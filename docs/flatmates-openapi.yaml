        '200':
          description: Map clusters and pins
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapViewResponse'

  /flatmates/web/stats:
    get:
      tags: [Web Discovery]
      summary: City statistics
      description: |
        Get city-level statistics for the cold-start city counter feature.
        Shows active user counts, listing counts, and match rates per city.
      operationId: getCityStats
      security: []
      parameters:
        - name: city
          in: query
          schema:
            type: string
          description: City name (optional, returns all cities if omitted)
      responses:
        '200':
          description: City statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CityStats'

  /flatmates/web/listings/{listing_id}/share-card:
    get:
      tags: [Web Discovery]
      summary: Generate share card
      description: |
        Generate a shareable image card for WhatsApp/Instagram Stories.
        Returns a URL to the generated card image.
      operationId: generateShareCard
      security: []
      parameters:
        - name: listing_id
          in: path
          required: true
          schema:
            type: integer
        - name: format
          in: query
          schema:
            type: string
            enum: [whatsapp_square, instagram_story, original]
            default: whatsapp_square
          description: Card format/aspect ratio
      responses:
        '200':
          description: Share card URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  card_url:
                    type: string
                    format: uri
                  format:
                    type: string
                  expires_at:
                    type: string
                    format: date-time

  /flatmates/web/listings/{listing_id}/analytics:
    get:
      tags: [Web Discovery]
      summary: Get listing analytics
      description: |
        Get analytics for a listing (owner only). Includes view counts, engagement metrics, and performance trends.
      operationId: getListingAnalytics
      security:
        - BearerAuth: []
      parameters:
        - name: listing_id
          in: path
          required: true
          schema:
            type: integer
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, all]
            default: 30d
      responses:
        '200':
          description: Listing analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingAnalytics'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /flatmates/web/dashboard:
    get:
      tags: [Web Discovery]
      summary: Room Poster dashboard
      description: |
        Get dashboard data for Room Posters including listing performance, lead counts, and activity summary.
      operationId: getRoomPosterDashboard
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomPosterDashboard'

  /flatmates/web/compatibility/{user_id}:
    get:
      tags: [Web Discovery]
      summary: Get compatibility breakdown
      description: |
        Get detailed compatibility breakdown between the current user and another user.
        Returns per-dimension scores and a plain-English summary.
      operationId: getCompatibilityBreakdown
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Compatibility breakdown
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompatibilityBreakdown'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Auth JWT token

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # ===================== AUTH SCHEMAS =====================
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        phone:
          type: string
        full_name:
          type: string
        role:
          type: string
          enum: [user, admin, agent]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        preferences:
          type: object
          additionalProperties: true

    UserLocation:
      type: object
      properties:
        city:
          type: string
        locality:
          type: string
        lat:
          type: number
          format: float
        lng:
          type: number
          format: float

    # ===================== BOOTSTRAP SCHEMAS =====================
    FlatmatesBootstrap:
      type: object
      required: [profile, catalogs, active_listing_count, conversation_count, unread_message_count]
      properties:
        profile:
          $ref: '#/components/schemas/FlatmatesProfile'
        catalogs:
          type: array
          items:
            $ref: '#/components/schemas/CatalogEntry'
        active_listing_count:
          type: integer
        conversation_count:
          type: integer
        unread_message_count:
          type: integer

    # ===================== CATALOG SCHEMAS =====================
    CatalogEntry:
      type: object
      required: [key, version, payload]
      properties:
        key:
          type: string
          description: Catalog key (e.g., flatmate_modes, move_in_timelines, quiz_dimensions, vibe_tags)
        version:
          type: integer
        payload:
          type: object
          additionalProperties: true
          description: Catalog data specific to the key

    # ===================== PROFILE SCHEMAS =====================
    FlatmatesProfile:
      type: object
      properties:
        id:
          type: integer
        full_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        profile_image_url:
          type: string
          format: uri
        mode:
          $ref: '#/components/schemas/FlatmatesMode'
        profile_status:
          $ref: '#/components/schemas/FlatmatesProfileStatus'
        onboarding_completed:
          type: boolean
          default: false
        bio:
          type: string
          maxLength: 500
        age:
          type: integer
          minimum: 18
          maximum: 100
        profession:
          type: string
        budget_min:
          type: number
          minimum: 0
        budget_max:
          type: number
          minimum: 0
        move_in_timeline:
          type: string
          enum: [immediate, this_month, next_month, flexible]
        city:
          type: string
        locality:
          type: string
        sleep_schedule:
          type: string
          enum: [early_bird, flexible, night_owl]
        cleanliness:
          type: string
          enum: [minimal, tidy, spotless]
        food_habits:
          type: string
          enum: [vegetarian, non_vegetarian, eggetarian, no_preference]
        smoking_drinking:
          type: string
          enum: [neither, smoke_outside, no_preference]
        guests_policy:
          type: string
          enum: [no_overnight, occasional_ok, open_house]
        work_style:
          type: string
          enum: [wfh_mostly, office_mostly, mixed]
        gender:
          type: string
        gender_preference:
          type: string
          enum: [male, female, any]
        preferences:
          type: object
          additionalProperties: true
          description: Extended flatmate preferences (JSONB)
        last_active_at:
          type: string
          format: date-time

    FlatmatesProfileUpdate:
      type: object
      properties:
        full_name:
          type: string
        profile_image_url:
          type: string
          format: uri
        mode:
          $ref: '#/components/schemas/FlatmatesMode'
        profile_status:
          $ref: '#/components/schemas/FlatmatesProfileStatus'
        onboarding_completed:
          type: boolean
        bio:
          type: string
          maxLength: 500
        age:
          type: integer
          minimum: 18
          maximum: 100
        profession:
          type: string
        budget_min:
          type: number
          minimum: 0
        budget_max:
          type: number
          minimum: 0
        move_in_timeline:
          type: string
          enum: [immediate, this_month, next_month, flexible]
        city:
          type: string
        locality:
          type: string
        sleep_schedule:
          type: string
          enum: [early_bird, flexible, night_owl]
        cleanliness:
          type: string
          enum: [minimal, tidy, spotless]
        food_habits:
          type: string
