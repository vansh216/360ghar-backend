          type: string
        profile_image_url:
          type: string
          format: uri
        mode:
          $ref: '#/components/schemas/FlatmatesMode'
        city:
          type: string
        locality:
          type: string
        age:
          type: integer
        profession:
          type: string
        bio:
          type: string
        budget_min:
          type: number
        budget_max:
          type: number
