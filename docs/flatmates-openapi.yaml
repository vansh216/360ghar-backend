openapi: 3.1.0
info:
  title: 360 Flatmates API
  description: |
    Complete API for the 360 Flatmates web platform — a swipe-based flatmate-finding app for India's young professionals.

    ## Authentication
    All endpoints require authentication via Bearer token in the `Authorization` header, unless marked as public.
    Tokens are obtained via Supabase Auth (Phone OTP + Password).

    ## User Modes
    - **room_poster** — Has a flat, wants to rent out a spare room
    - **co_hunter** — Looking for people to flat-search with
    - **open_to_both** — Flexible, open to either

    ## Base URL
    `/api/v1`
  version: 1.0.0
  contact:
    name: 360 Ghar
    url: https://360ghar.com
  license:
    name: Confidential
    url: https://360ghar.com

servers:
  - url: https://api.360ghar.com/api/v1
    description: Production
  - url: http://localhost:8000/api/v1
    description: Local Development

tags:
  - name: Auth
    description: User authentication and session management
  - name: Bootstrap
    description: Initial data loading after authentication
  - name: Profiles
    description: Flatmate profile CRUD and discovery
  - name: Catalogs
    description: Server-driven business metadata
  - name: Swipes
    description: Swipe actions and compatibility matching
  - name: Likes
    description: Incoming likes and match management
  - name: Matches
    description: Active matches and unmatching
  - name: Conversations
    description: Chat conversations and messages
  - name: Visits
    description: Flatmate meet scheduling and management
  - name: Listings
    description: Property listing CRUD and discovery
  - name: Notifications
    description: Push and in-app notifications
  - name: Blocks & Reports
    description: User safety, blocking, and reporting
  - name: Interactions
    description: Profile views and society tag voting
  - name: SSE
    description: Server-sent events for real-time updates
  - name: Admin Moderation
    description: Admin-only listing and report moderation
  - name: Web Discovery
    description: Web-optimized search, saved searches, and alerts

paths:
  # ===================== AUTH =====================
  /users/me:
    get:
      tags: [Auth]
      summary: Get current user
      description: Validate the authenticated user exists and return basic user info.
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/location:
    get:
      tags: [Auth]
      summary: Get user location
      description: Returns the current user's location data.
      operationId: getUserLocation
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User location
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLocation'

  # ===================== BOOTSTRAP =====================
  /flatmates/bootstrap:
    get:
      tags: [Bootstrap]
      summary: Bootstrap data
      description: Load profile, catalogs, and activity counts after authentication.
      operationId: getFlatmatesBootstrap
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Bootstrap data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlatmatesBootstrap'

  # ===================== CATALOGS =====================
  /flatmates/catalogs:
    get:
      tags: [Catalogs]
      summary: Get business catalogs
      description: Server-driven business metadata (modes, timelines, quiz dimensions, vibe tags, report reasons, icebreakers, room types, furnishing options, etc.).
      operationId: getFlatmatesCatalogs
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of catalog entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogEntry'

  # ===================== PROFILES =====================
  /flatmates/profile:
    get:
      tags: [Profiles]
      summary: Get my flatmate profile
      description: Fetch the authenticated user's flatmate profile.
      operationId: getMyFlatmatesProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Flatmate profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlatmatesProfile'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Profiles]
      summary: Update my flatmate profile
      description: Update the authenticated user's flatmate profile fields.
      operationId: updateMyFlatmatesProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlatmatesProfileUpdate'
      responses:
        '200':
          description: Updated flatmate profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlatmatesProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /flatmates/profiles:
    get:
      tags: [Profiles]
      summary: Discover profiles
      description: Fetch discoverable peer profiles for the swipe deck. Applies deal-breaker (non-negotiables) and discovery filtering.
      operationId: discoverProfiles
      security:
        - BearerAuth: []
      parameters:
        - name: city
          in: query
          schema:
            type: string
          description: Filter by city
        - name: budget_min
          in: query
          schema:
            type: integer
            minimum: 0
          description: Minimum budget
        - name: budget_max
          in: query
          schema:
            type: integer
            minimum: 0
          description: Maximum budget
        - name: move_in
          in: query
          schema:
            type: string
            enum: [immediate, this_month, next_month, flexible]
          description: Move-in timeline filter
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of profiles to return
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Pagination offset
      responses:
        '200':
          description: List of discoverable peer profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FlatmatesPeer'

  # ===================== SWIPES =====================
  /flatmates/swipes:
    post:
      tags: [Swipes]
      summary: Record a swipe
      description: |
        Record a swipe action (like, pass, or super-like) on a property or user profile.
        - For property swipes: set `target_type=property` and provide `property_id`
        - For user swipes: set `target_type=user` and provide `target_user_id`
        - Mutual likes automatically create a match and conversation.
        - Super-likes are capped at 3 per day.
      operationId: recordSwipe
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwipeRequest'
      responses:
        '200':
          description: Swipe result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwipeResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          description: Super-like daily limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Super-like daily limit reached

  # ===================== LIKES =====================
  /flatmates/likes:
    get:
      tags: [Likes]
      summary: Get incoming likes
      description: Fetch profiles that have swiped right on the current user but haven't been answered yet.
      operationId: getIncomingLikes
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: List of incoming likes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IncomingLikeSummary'

  # ===================== MATCHES =====================
  /flatmates/matches:
    get:
      tags: [Matches]
      summary: Get my matches
      description: Fetch all active matches for the current user.
      operationId: getMyMatches
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MatchSummary'

  /flatmates/matches/{match_id}/unmatch:
    put:
      tags: [Matches]
      summary: Unmatch
      description: Unmatch a specific match, closing the associated conversation.
      operationId: unmatch
      security:
        - BearerAuth: []
      parameters:
        - name: match_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Successfully unmatched
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Match removed successfully
        '404':
          $ref: '#/components/responses/NotFound'

  # ===================== CONVERSATIONS =====================
  /flatmates/conversations:
    get:
      tags: [Conversations]
      summary: List conversations
      description: Fetch all conversations for the current user, ordered by last message timestamp.
      operationId: listConversations
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of conversation summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversationSummary'

  /flatmates/conversations/{conversation_id}:
    get:
      tags: [Conversations]
      summary: Get conversation detail
      description: Fetch full conversation summary including peer info, unread count, and Q&A state.
      operationId: getConversationDetail
      security:
        - BearerAuth: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Conversation detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationSummary'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /flatmates/conversations/{conversation_id}/messages:
    get:
      tags: [Conversations]
      summary: Get conversation messages
      description: Fetch messages for a conversation. Automatically marks unread messages as read.
      operationId: getConversationMessages
      security:
        - BearerAuth: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: integer
        - name: before
          in: query
          schema:
            type: integer
          description: Fetch messages before this message ID (for pagination)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Number of messages to return
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MessageOut'

    post:
      tags: [Conversations]
      summary: Send a message
      description: Send a text, image, or visit_request message to a conversation.
      operationId: sendMessage
      security:
        - BearerAuth: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageCreate'
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOut'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /flatmates/conversations/{conversation_id}/mark-read:
    post:
      tags: [Conversations]
      summary: Mark conversation as read
      description: Mark all peer messages in a conversation as read.
      operationId: markConversationRead
      security:
        - BearerAuth: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Conversation marked as read

  /flatmates/conversations/{conversation_id}/qna:
    post:
      tags: [Conversations]
      summary: Save Q&A answers
      description: Save guided Q&A answers for a match. Answers are visible to both parties.
      operationId: saveQnAAnswers
      security:
        - BearerAuth: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QnAAnswers'
      responses:
        '200':
          description: Q&A answers saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Q&A answers saved successfully

  # ===================== VISITS =====================
  /visits:
    post:
      tags: [Visits]
      summary: Schedule a visit
      description: |
        Schedule a flatmate meet or property tour.
        For flatmate meets, set `visit_context=flatmate_meet` and provide `conversation_id` and `counterparty_user_id`.
      operationId: scheduleVisit
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisitCreate'
      responses:
        '201':
          description: Visit scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Visit'
        '400':
          $ref: '#/components/responses/BadRequest'

    get:
      tags: [Visits]
      summary: Get my visits
      description: Fetch all visits for the current user.
      operationId: getMyVisits
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of visits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitList'

  /visits/upcoming:
    get:
      tags: [Visits]
      summary: Get upcoming visits
      operationId: getUpcomingVisits
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Upcoming visits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitSlice'

  /visits/past:
    get:
      tags: [Visits]
      summary: Get past visits
      operationId: getPastVisits
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Past visits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitSlice'

  /visits/{visit_id}:
    get:
      tags: [Visits]
      summary: Get visit details
      operationId: getVisitDetails
      security:
        - BearerAuth: []
      parameters:
        - name: visit_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Visit details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Visit'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Visits]
      summary: Update visit
      description: Update visit status or scheduled date. Used for confirm/reschedule/cancel actions.
      operationId: updateVisit
      security:
        - BearerAuth: []
      parameters:
        - name: visit_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisitUpdate'
      responses:
        '200':
          description: Updated visit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Visit'

  /visits/{visit_id}/reschedule:
    post:
      tags: [Visits]
      summary: Reschedule a visit
      operationId: rescheduleVisit
      security:
        - BearerAuth: []
      parameters:
        - name: visit_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisitReschedule'
      responses:
        '200':
          description: Rescheduled visit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Visit'

  /visits/{visit_id}/cancel:
    post:
      tags: [Visits]
      summary: Cancel a visit
      operationId: cancelVisit
      security:
        - BearerAuth: []
      parameters:
        - name: visit_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisitCancel'
      responses:
        '200':
          description: Cancelled visit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Visit'

  /visits/{visit_id}/complete:
    post:
      tags: [Visits]
      summary: Mark visit as completed
      description: Mark a visit as completed with optional notes and feedback.
      operationId: completeVisit
      security:
        - BearerAuth: []
      parameters:
        - name: visit_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisitComplete'
      responses:
        '200':
          description: Completed visit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Visit'

  # ===================== LISTINGS =====================
  /properties:
    post:
      tags: [Listings]
      summary: Create a listing
      description: |
        Create a new property listing. For flatmate listings, set `property_type=flatmate` and `purpose=rent`.
        The listing enters manual review (24-hour SLA) before going live.
        AI pre-screening runs automatically before human review.
      operationId: createListing
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyCreate'
      responses:
        '201':
          description: Listing created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Property'
        '400':
          $ref: '#/components/responses/BadRequest'

    get:
      tags: [Listings]
      summary: Discover listings
      description: |
        Discover listings with comprehensive filtering.
        For flatmate listings, filter with `property_type=flatmate` and `purpose=rent`.
        Supports location-based search, text search, semantic search, and 30+ filter parameters.
      operationId: discoverListings
      security: []
      parameters:
        - name: property_type
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [flatmate, pg]
          description: Filter by property type
        - name: purpose
          in: query
          schema:
            type: string
            enum: [rent]
          description: Filter by purpose
        - name: lat
          in: query
          schema:
            type: number
            format: float
          description: Latitude for location-based search
        - name: lng
          in: query
          schema:
            type: number
            format: float
          description: Longitude for location-based search
        - name: radius
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 5
          description: Search radius in km
        - name: q
          in: query
          schema:
            type: string
          description: Search query for text or semantic search
        - name: semantic_search
          in: query
          schema:
            type: boolean
            default: false
          description: Enable semantic vector similarity search
        - name: city
          in: query
          schema:
            type: string
        - name: locality
          in: query
          schema:
            type: string
        - name: price_min
          in: query
          schema:
            type: number
            minimum: 0
        - name: price_max
          in: query
          schema:
            type: number
            maximum: 1000000000
        - name: bedrooms_min
          in: query
          schema:
            type: integer
            minimum: 0
        - name: bedrooms_max
          in: query
          schema:
            type: integer
            maximum: 20
        - name: sharing_type
          in: query
          schema:
            type: string
            enum: [private_room, shared_room, master_bedroom, entire_flat]
        - name: gender_preference
          in: query
          schema:
            type: string
            enum: [male, female, any]
        - name: move_in
          in: query
          schema:
            type: string
            enum: [immediate, this_month, next_month, flexible]
          description: Move-in timeline filter
        - name: available_from
          in: query
          schema:
            type: string
            format: date
          description: Minimum availability date (YYYY-MM-DD)
        - name: amenities
          in: query
          schema:
            type: array
            items:
              type: string
        - name: features
          in: query
          schema:
            type: array
            items:
              type: string
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [distance, price_low, price_high, newest, popular, relevance]
            default: newest
        - name: exclude_swiped
          in: query
          schema:
            type: boolean
            default: false
          description: Exclude properties already swiped by the authenticated user
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated listings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedPropertyResponse'

  /properties/semantic-search:
    get:
      tags: [Listings]
      summary: Semantic property search
      description: Perform semantic (vector-powered) property search combining vector similarity with traditional filters.
      operationId: semanticSearchListings
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (required for semantic search)
        - name: property_type
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [flatmate, pg]
        - name: city
          in: query
          schema:
            type: string
        - name: locality
          in: query
          schema:
            type: string
        - name: price_min
          in: query
          schema:
            type: number
            minimum: 0
        - name: price_max
          in: query
          schema:
            type: number
            maximum: 1000000000
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated semantic search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedPropertyResponse'
        '400':
          description: Search query required
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: A search query (q) is required for semantic search

  /properties/recommendations:
    get:
      tags: [Listings]
      summary: Get property recommendations
      description: |
        Get property recommendations.
        - With authentication: Personalized recommendations based on user preferences and swipes
        - Without authentication: Popular properties based on likes and recency
      operationId: getPropertyRecommendations
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        '200':
          description: Recommended properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Property'

  /properties/me:
    get:
      tags: [Listings]
      summary: Get my listings
      description: List all listings owned by the current user.
      operationId: getMyListings
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User's listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Property'

  /properties/{property_id}:
    get:
      tags: [Listings]
      summary: Get listing details
      description: |
        Get full property details. For flatmate listings, non-live listings are only visible to the owner or admins.
        Enriched with user-specific context (liked status, visit info) when authenticated.
      operationId: getListingDetails
      security: []
      parameters:
        - name: property_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Property details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Property'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
