        Server-sent events stream for real-time flatmates updates.
        Event types: `new_match`, `new_message`, `conversation_updated`, `visit_updated`, `listing_status_changed`, `new_notification`.
      operationId: flatmatesSse
      security:
        - BearerAuth: []
      responses:
        '200':
          description: SSE stream
